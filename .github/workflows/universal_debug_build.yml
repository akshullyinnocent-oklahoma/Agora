name: Build armeabi-v7a Debug APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build armeabi-v7a Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java & Cache Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      # Build the fdroid debug APK (fdroid flavor includes proot sandbox).
      # The ubuntu runner has NDK 28 pre-installed at /usr/local/lib/android/sdk/ndk/28.2.13676358
      # which handles the agora_proot CMake stub build.
      # Prebuilt proot .so files (libproot_exec.so, libproot_loader.so, libtalloc.so)
      # must be committed in app/src/main/jniLibs/armeabi-v7a/ and app/src/fdroid/jniLibs/armeabi-v7a/.
      - name: Build Debug APK
        run: ./gradlew assembleFdroidDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-armeabi-v7a-debug-apk
          path: "**/build/outputs/apk/**/*.apk"