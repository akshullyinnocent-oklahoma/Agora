name: Build armeabi-v7a Debug APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build armeabi-v7a Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java & Cache Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      # ── Build proot + talloc native libs for armeabi-v7a ──
      # The ubuntu runner has NDK 28.2.13676358 pre-installed.
      # build-proot.sh auto-detects it via ANDROID_HOME/NDK paths.
      - name: Build Proot Native Libraries (armeabi-v7a)
        run: |
          export ANDROID_NDK_HOME="/usr/local/lib/android/sdk/ndk/28.2.13676358"
          chmod +x ./build-proot.sh
          ./build-proot.sh --force armeabi-v7a

      # ── Assemble the fdroid debug APK ──
      # fdroid flavor has the full proot sandbox; play flavor is a stub.
      - name: Build Debug APK
        run: ./gradlew assembleFdroidDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-armeabi-v7a-debug-apk
          path: "**/build/outputs/apk/**/*.apk"