site_name: Agora User Manual
site_description: Guide for configuring and using Agora
site_url: https://newo-ether.github.io/Agora/
repo_url: https://github.com/newo-ether/Agora
repo_name: newo-ether/Agora

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share

plugins:
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
